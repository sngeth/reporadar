<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoRadar - Trending AI & Agent Repositories</title>
    <meta name="description" content="Weekly curated list of trending GitHub repositories for AI, agents, and developer tools">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #fafafa;
        }

        .nav {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: #000;
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .logo-emoji {
            margin-right: 8px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-link {
            color: #666;
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #000;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        .header {
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.125rem;
            color: #666;
        }

        .update-badge {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8125rem;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .featured-repo {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 48px;
        }

        .repo-header {
            margin-bottom: 24px;
        }

        .repo-name {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .repo-name a {
            color: #000;
            text-decoration: none;
        }

        .repo-name a:hover {
            color: #0066cc;
        }

        .repo-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 16px;
        }

        .repo-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .repo-description {
            font-size: 1.0625rem;
            line-height: 1.7;
            color: #1a1a1a;
            margin-bottom: 24px;
        }

        .repo-category {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8125rem;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .repo-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e5e5;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #000;
            display: block;
        }

        .stat-label {
            font-size: 0.8125rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .highlights {
            margin-top: 24px;
        }

        .highlights h3 {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 12px;
        }

        .highlights ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .highlights li {
            background: #f9f9f9;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.875rem;
        }

        .alternates {
            margin-top: 48px;
        }

        .alternates h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .alternate-item {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .alternate-item h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .alternate-item h3 a {
            color: #000;
            text-decoration: none;
        }

        .alternate-item h3 a:hover {
            color: #0066cc;
        }

        .alternate-item p {
            color: #666;
            font-size: 0.9375rem;
            margin-bottom: 12px;
        }

        .alternate-meta {
            display: flex;
            gap: 16px;
            font-size: 0.8125rem;
            color: #666;
        }

        footer {
            text-align: center;
            padding: 48px 24px;
            border-top: 1px solid #e5e5e5;
            margin-top: 64px;
        }

        footer p {
            font-size: 0.8125rem;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 60px 24px;
            color: #999;
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 2rem;
            }

            .repo-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <a href="index.html" class="logo"><span class="logo-emoji">📡</span>RepoRadar</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Latest</a>
                <a href="archive.html" class="nav-link">Archive</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <span class="update-badge" id="update-date">Loading...</span>
            <h1>Trending AI & Agent Repositories</h1>
            <p class="subtitle">Weekly curated list of the hottest GitHub repos</p>
        </div>

        <div id="content" class="loading">Loading repository data...</div>
    </div>

    <footer>
        <p>Data from GitHub · Updated Weekly</p>
        <p style="margin-top: 8px; font-size: 0.75rem;">AI Agents · Developer Tools · Frameworks</p>
    </footer>

    <script>
        async function loadData() {
            try {
                const response = await fetch('latest-repos.json');
                const data = await response.json();

                document.getElementById('update-date').textContent = `Week of ${formatDate(data.date)}`;

                const content = document.getElementById('content');
                content.innerHTML = generateContent(data);
            } catch (err) {
                console.error('Error loading data:', err);
                document.getElementById('content').innerHTML = '<div class="loading">Unable to load data. Please refresh.</div>';
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        function generateContent(data) {
            const repo = data.repository;
            const analysis = data.analysis;

            return `
                <div class="featured-repo">
                    <div class="repo-header">
                        <span class="repo-category">${analysis.category}</span>
                        <h2 class="repo-name">
                            <a href="${repo.url}" target="_blank" rel="noopener">${repo.fullName}</a>
                        </h2>
                        <div class="repo-meta">
                            <span>⭐ ${formatNumber(repo.stars)} stars</span>
                            <span>🍴 ${formatNumber(repo.forks)} forks</span>
                            <span>👀 ${formatNumber(repo.watchers)} watchers</span>
                            ${repo.language ? `<span>💻 ${repo.language}</span>` : ''}
                        </div>
                    </div>

                    <p class="repo-description">${repo.description}</p>

                    ${repo.homepage ? `
                        <p style="margin-bottom: 16px;">
                            <a href="${repo.homepage}" target="_blank" rel="noopener" style="color: #0066cc; text-decoration: none;">
                                🔗 Project Homepage →
                            </a>
                        </p>
                    ` : ''}

                    <div class="repo-stats">
                        <div class="stat">
                            <span class="stat-value">${formatNumber(repo.stars)}</span>
                            <span class="stat-label">Stars</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">${formatNumber(repo.forks)}</span>
                            <span class="stat-label">Forks</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">${repo.score}</span>
                            <span class="stat-label">Score</span>
                        </div>
                    </div>

                    ${analysis.technicalHighlights.length > 0 ? `
                        <div class="highlights">
                            <h3>Highlights</h3>
                            <ul>
                                ${analysis.technicalHighlights.map(h => `<li>${h}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                </div>

                <div class="alternates">
                    <h2>Also Trending This Week</h2>
                    ${data.alternates.map(alt => `
                        <div class="alternate-item">
                            <h3><a href="${alt.url}" target="_blank" rel="noopener">${alt.fullName}</a></h3>
                            <p>${alt.description}</p>
                            <div class="alternate-meta">
                                <span>⭐ ${formatNumber(alt.stars)}</span>
                                <span>🍴 ${formatNumber(alt.forks)}</span>
                                ${alt.language ? `<span>${alt.language}</span>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        loadData();
    </script>
</body>
</html>
