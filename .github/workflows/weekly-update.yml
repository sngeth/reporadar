name: Weekly Repository Update

on:
  schedule:
    # Run every Sunday at 12:00 PM UTC (7 AM EST)
    - cron: '0 12 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch trending repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node fetch-repos.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add latest-repos.json archive/ archive-index.json
          git diff --staged --quiet || git commit -m "🔄 Weekly update: $(date +'%Y-%m-%d')"
          git push
